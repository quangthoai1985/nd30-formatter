# ND30 Formatter — Wrangler Configuration
# Deploy: npx wrangler pages deploy dist

name = "nd30-formatter"
compatibility_date = "2024-12-01"

# Environment Variables (cấu hình qua Dashboard sau deploy)
# GEMINI_API_KEY = "..." ← Set via: npx wrangler pages secret put GEMINI_API_KEY

# D1 Database (uncomment khi cần)
# [[d1_databases]]
# binding = "DB"
# database_name = "nd30-jobs"
# database_id = "xxx-xxx-xxx"

# R2 Storage (uncomment khi cần)
# [[r2_buckets]]
# binding = "BUCKET"
# bucket_name = "nd30-uploads"
